name: Run main.py hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-main:
    runs-on: ubuntu-latest
    environment: Discord bookmark to Notion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests notion-client

      - name: Run main.py
        run: python main.py
        env:
          DISCORD_API: ${{ secrets.DISCORD_API }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TARGET_GUILD_ID: ${{ secrets.TARGET_GUILD_ID }}
          TARGET_EMOJIS: ${{ secrets.TARGET_EMOJIS }}
          STATE_PATH: ${{ secrets.STATE_PATH }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}

      - name: Commit and push state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add state.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update state.json"
            git push
          fi